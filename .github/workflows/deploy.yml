name: Deploy to Production

on:
  push:
    branches: ['**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger staging deploy (server)
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://brennan.games/deploy-carkedit-api.php?token=${{ secrets.DEPLOY_TOKEN }}&branch=${{ github.ref_name }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Deploy failed with HTTP $HTTP_CODE"
            exit 1
          fi
          STATUS=$(echo "$BODY" | jq -r '.status')
          if [ "$STATUS" = "skipped" ]; then
            echo "Deploy skipped: $(echo "$BODY" | jq -r '.message')"
          elif [ "$STATUS" = "ok" ]; then
            echo "Server deploy successful!"
          else
            echo "::error::Deploy status: $STATUS"
            exit 1
          fi
